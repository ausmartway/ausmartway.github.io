<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yulei Liu — DevSecOps and Cloud Infrastructure Professional. HashiCorp, Terraform, Vault, Go. Based in Sydney, Australia.">
  <title>Yulei Liu — DevSecOps Professional</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Custom Properties ── */
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #58a6ff;
      --green:   #3fb950;
      --orange:  #f78166;
      --purple:  #d2a8ff;
      --yellow:  #e3b341;
    }

    /* ── Base ── */
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Shared: Section Labels and Titles ── */
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Shared: Buttons ── */
    .btn-primary {
      background: #238636;
      color: var(--text);
      border: 1px solid #2ea043;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #2ea043; }

    .btn-ghost {
      background: var(--surface);
      color: var(--blue);
      border: 1px solid var(--border);
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--blue); }

    /* ── Shared: Language Badge ── */
    .lang-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--green);
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Shared: Focus Tag ── */
    .focus-tag {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Shared: Section wrapper ── */
    .section {
      max-width: 860px;
      margin: 0 auto 64px;
      padding: 0 32px;
    }

    /* ── Cursor blink ── */
    @keyframes blink { 50% { opacity: 0; } }
    .cursor {
      display: inline-block;
      width: 9px;
      height: 16px;
      background: var(--blue);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    /* ── Mobile base ── */
    @media (max-width: 600px) {
      .section-title { font-size: 18px; }
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,17,23,0.85);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--green);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .nav-dropdown {
      display: none;
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 101;
    }
    .nav-dropdown a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
      padding: 12px 24px;
      transition: color 0.2s;
    }
    .nav-dropdown a:hover { color: var(--text); }
    nav.open .nav-dropdown { display: block; }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .nav-hamburger { display: block; }
    }
  </style>
</head>
<body>

<nav id="main-nav">
  <a href="#" class="nav-brand">~/yuleiliu</a>
  <ul class="nav-links">
    <li><a href="#expertise">Expertise</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
  <div class="nav-dropdown" id="nav-dropdown">
    <a href="#expertise" class="dropdown-link">Expertise</a>
    <a href="#projects" class="dropdown-link">Projects</a>
    <a href="#contact" class="dropdown-link">Contact</a>
  </div>
</nav>
  <!-- HERO: Task 3 -->
  <!-- EXPERTISE: Task 5 -->
  <!-- PROJECTS: Task 6 -->
  <!-- CONTACT+FOOTER: Task 7 -->

  <script>
    (function () {
      var nav = document.getElementById('main-nav');
      var hamburger = document.getElementById('hamburger');

      hamburger.addEventListener('click', function () {
        nav.classList.toggle('open');
      });

      document.querySelectorAll('.dropdown-link').forEach(function (link) {
        link.addEventListener('click', function () {
          nav.classList.remove('open');
        });
      });

      document.addEventListener('click', function (e) {
        if (!nav.contains(e.target)) nav.classList.remove('open');
      });
    }());
  </script>
</body>
</html>
